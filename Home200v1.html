<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOME — Product Research v1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a; --bg2:#121212; --bg3:#1a1a1a;
    --border:#222; --border2:#333;
    --text:#f0f0f0; --muted:#777; --muted2:#3a3a3a;
    --accent:#4fc3f7; --accent2:#ff6b35; --white:#fff;
    --tik:#69c9d0; --ig:#e1306c; --fb:#5890ff; --amz:#ffaa44; --ali:#ff6b35;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;font-size:14px;}

  /* LOGIN */
  #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .login-box{width:min(400px,92vw);padding:40px 28px;border:1px solid var(--border2);background:var(--bg2);position:relative;}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
  .login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:.15em;color:var(--white);margin-bottom:8px;}
  .login-logo span{color:var(--accent);}
  .login-sub{font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:36px;}
  .login-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:block;}
  .login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:16px;padding:14px 16px;outline:none;transition:border-color .2s;letter-spacing:.1em;}
  .login-input:focus{border-color:var(--accent);}
  .login-btn{width:100%;margin-top:16px;padding:15px;background:var(--accent);color:#000;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
  .login-btn:hover{opacity:.85;}
  .login-error{margin-top:12px;font-size:12px;color:var(--accent2);letter-spacing:.1em;display:none;text-align:center;}

  /* APP */
  #app{display:none;}
  .header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
  .header-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:.2em;color:var(--white);}
  .header-logo span{color:var(--accent);}
  .header-meta{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}

  .stats-bar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:0;background:var(--bg2);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .stats-bar::-webkit-scrollbar{display:none;}
  .stat{display:flex;flex-direction:column;gap:4px;min-width:80px;padding-right:20px;border-right:1px solid var(--border);margin-right:20px;flex-shrink:0;}
  .stat:last-child{border-right:none;}
  .stat-val{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;color:var(--white);}
  .stat-val.accent{color:var(--accent);}
  .stat-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

  .toolbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .search-input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:8px 14px;outline:none;width:220px;letter-spacing:.05em;}
  .search-input:focus{border-color:var(--accent);}
  .filter-btn{padding:7px 14px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;}
  .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,.07);}

  /* TABLE */
  .table-wrap{padding:0 20px 280px;}
  table{width:100%;border-collapse:collapse;}
  thead tr{border-bottom:2px solid var(--border2);position:sticky;top:56px;background:var(--bg);z-index:50;}
  th{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:14px 10px;text-align:left;font-weight:400;white-space:nowrap;}
  th:first-child{padding-left:0;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer;}
  tbody tr:hover{background:var(--bg2);}
  td{padding:14px 10px;font-size:12px;color:var(--text);vertical-align:top;}
  td:first-child{padding-left:0;}
  .td-num{color:var(--muted);font-size:11px;width:36px;padding-top:16px;}
  .td-name{font-family:'Syne',sans-serif;font-weight:600;font-size:14px;color:var(--white);min-width:160px;padding-top:14px;line-height:1.4;}
  .td-cat{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:rgba(79,195,247,.08);padding:4px 10px;display:inline-block;border:1px solid rgba(79,195,247,.15);}

  .links-col{display:flex;flex-direction:column;gap:5px;min-width:120px;}
  .link-row{display:flex;gap:5px;flex-wrap:wrap;}
  .link-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;border:1px solid var(--border2);color:#888;background:transparent;white-space:nowrap;transition:all .15s;font-family:'DM Mono',monospace;}
  .link-btn.ali{color:var(--ali);border-color:rgba(255,107,53,.3);}
  .link-btn.tik{color:var(--tik);border-color:rgba(105,201,208,.3);}
  .link-btn.ig{color:var(--ig);border-color:rgba(225,48,108,.3);}
  .link-btn.fb{color:var(--fb);border-color:rgba(88,144,255,.3);}
  .link-btn.amz{color:var(--amz);border-color:rgba(255,170,68,.3);}
  .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}

  .ratings-col{display:flex;flex-direction:column;gap:5px;min-width:180px;}
  .rating-row{display:flex;align-items:center;gap:8px;}
  .rating-key{font-size:10px;color:#666;letter-spacing:.05em;width:80px;flex-shrink:0;}
  .rating-badge{font-size:11px;letter-spacing:.06em;padding:3px 8px;border:1px solid #2a2a2a;color:#555;}
  .rating-badge.val-good,.rating-badge.val-wow,.rating-badge.val-yes,.rating-badge.val-vgood,.rating-badge.val-5x{color:var(--accent);border-color:rgba(79,195,247,.3);}
  .rating-badge.val-notbad,.rating-badge.val-notyet,.rating-badge.val-3x{color:#ffaa00;border-color:rgba(255,170,0,.3);}
  .rating-badge.val-bad,.rating-badge.val-no{color:#ff5555;border-color:rgba(255,85,85,.3);}

  /* RATING PANEL */
  #rating-panel{position:fixed;right:0;top:0;bottom:0;width:min(420px,100vw);background:var(--bg2);border-left:1px solid var(--border2);z-index:200;transform:translateX(100%);transition:transform .25s;overflow-y:auto;}
  #rating-panel.open{transform:translateX(0);}
  .panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--bg2);z-index:10;}
  .panel-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--white);line-height:1.4;}
  .panel-cat{font-size:9px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;margin-top:4px;}
  .panel-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px;line-height:1;}
  .panel-close:hover{color:var(--white);}
  .panel-body{padding:20px 24px;}
  .panel-section{margin-bottom:20px;}
  .panel-section-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .panel-links{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}

  .rating-field{margin-bottom:16px;}
  .rating-field-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
  .rating-options{display:flex;gap:6px;flex-wrap:wrap;}
  .rating-opt{padding:7px 14px;font-size:11px;letter-spacing:.08em;border:1px solid var(--border2);background:transparent;color:#666;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;}
  .rating-opt:hover{border-color:var(--accent);color:var(--accent);}
  .rating-opt.selected-good,.rating-opt.selected-wow,.rating-opt.selected-yes,.rating-opt.selected-vgood,.rating-opt.selected-5x{background:rgba(79,195,247,.12);border-color:var(--accent);color:var(--accent);}
  .rating-opt.selected-notbad,.rating-opt.selected-notyet,.rating-opt.selected-3x{background:rgba(255,170,0,.1);border-color:#ffaa00;color:#ffaa00;}
  .rating-opt.selected-bad,.rating-opt.selected-no{background:rgba(255,85,85,.1);border-color:#ff5555;color:#ff5555;}

  .notes-field{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:12px;resize:vertical;min-height:80px;outline:none;margin-top:8px;}
  .notes-field:focus{border-color:var(--accent);}
  .save-btn{width:100%;padding:14px;background:var(--accent);color:#000;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;margin-top:8px;}
  .save-btn:hover{opacity:.85;}
  .notes-preview{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px;line-height:1.5;}

  /* MOBILE CARDS */
  #card-list{display:none;}
  @media (max-width:768px){
    .table-wrap table{display:none;}
    #card-list{display:flex;flex-direction:column;gap:1px;}
    .table-wrap{padding:0 0 280px;overflow-x:visible;}
    .product-card{background:#111;border-bottom:1px solid #1e1e1e;padding:16px 14px;}
    .product-card:active{background:#161616;}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;}
    .card-left{display:flex;gap:10px;align-items:flex-start;}
    .card-num{font-size:11px;color:#444;min-width:26px;padding-top:2px;flex-shrink:0;}
    .card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;line-height:1.3;}
    .card-cat{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:rgba(79,195,247,.07);border:1px solid rgba(79,195,247,.15);padding:3px 7px;white-space:nowrap;flex-shrink:0;}
    .card-section{margin-bottom:8px;}
    .card-section-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#444;margin-bottom:4px;}
    .card-links{display:flex;flex-wrap:wrap;gap:5px;}
    .card-link{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;font-size:10px;letter-spacing:.07em;text-transform:uppercase;text-decoration:none;border:1px solid #2a2a2a;color:#888;font-family:'DM Mono',monospace;}
    .card-link.ali{color:#ff6b35;border-color:rgba(255,107,53,.25);}
    .card-link.tik{color:#69c9d0;border-color:rgba(105,201,208,.25);}
    .card-link.ig{color:#e1306c;border-color:rgba(225,48,108,.25);}
    .card-link.fb{color:#5890ff;border-color:rgba(88,144,255,.25);}
    .card-link.amz{color:#ffaa44;border-color:rgba(255,170,68,.25);}
    .card-ratings-mini{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
    .card-rating-chip{font-size:10px;padding:3px 8px;border:1px solid #2a2a2a;color:#555;}
    .chip-good,.chip-wow,.chip-yes,.chip-vgood,.chip-5x{color:var(--accent);border-color:rgba(79,195,247,.3);}
    .chip-notbad,.chip-notyet,.chip-3x{color:#ffaa00;border-color:rgba(255,170,0,.3);}
    .chip-bad,.chip-no{color:#ff5555;border-color:rgba(255,85,85,.3);}
    .panel-header{padding:16px 16px;}
    #rating-panel{width:100vw;}
    .toolbar{padding:12px 14px;}
    .search-input{width:100%;}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">HOME<span>.</span></div>
    <div class="login-sub">Product Research DB · v1</div>
    <label class="login-label">Access Password</label>
    <input type="password" class="login-input" id="pwd-input" placeholder="••••••••" autocomplete="off">
    <button class="login-btn" onclick="checkPwd()">Enter</button>
    <div class="login-error" id="pwd-error">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-logo">HOME<span>.</span></div>
    <div class="header-meta">Product Research · v1</div>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val accent">200</div><div class="stat-label">Total Products</div></div>
    <div class="stat"><div class="stat-val">Home</div><div class="stat-label">Category</div></div>
    <div class="stat"><div class="stat-val" id="stat-rated">0</div><div class="stat-label">Rated</div></div>
    <div class="stat"><div class="stat-val" id="stat-wow">0</div><div class="stat-label">Wow Items</div></div>
    <div class="stat"><div class="stat-val" id="stat-5x">0</div><div class="stat-label">5x Margin</div></div>
  </div>
  <div class="toolbar">
    <input type="text" class="search-input" id="search-input" placeholder="Search products..." oninput="applyFilters()">
    <button class="filter-btn active" data-cat="all" onclick="setFilter(this,'all')">All</button>
    <button class="filter-btn" data-cat="Kitchen" onclick="setFilter(this,'Kitchen')">Kitchen</button>
    <button class="filter-btn" data-cat="Organization" onclick="setFilter(this,'Organization')">Organization</button>
    <button class="filter-btn" data-cat="Cleaning" onclick="setFilter(this,'Cleaning')">Cleaning</button>
    <button class="filter-btn" data-cat="Bedroom" onclick="setFilter(this,'Bedroom')">Bedroom</button>
    <button class="filter-btn" data-cat="Bathroom" onclick="setFilter(this,'Bathroom')">Bathroom</button>
    <button class="filter-btn" data-cat="Living Room" onclick="setFilter(this,'Living Room')">Living Room</button>
    <button class="filter-btn" data-cat="Smart Home" onclick="setFilter(this,'Smart Home')">Smart Home</button>
    <button class="filter-btn" data-cat="Office" onclick="setFilter(this,'Office')">Office</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>#</th><th>Product Name</th><th>Category</th><th>Links</th><th>Ratings</th></tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div id="card-list"></div>
  </div>
</div>

<!-- RATING PANEL -->
<div id="rating-panel">
  <div class="panel-header">
    <div>
      <div class="panel-title" id="panel-title">—</div>
      <div class="panel-cat" id="panel-cat">—</div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div class="panel-links" id="panel-links"></div>
    <div id="rating-fields"></div>
    <div class="notes-preview" id="notes-preview"></div>
    <button class="save-btn" onclick="saveRatings()">Save Ratings</button>
  </div>
</div>

const VAL_LABELS = {good:"Good",wow:"Wow",notbad:"Not Bad",bad:"Bad",yes:"Yes",no:"No",notyet:"Not Yet",vgood:"Very Good","3x":"3x","5x":"5x"};

let currentFilter="all", currentIdx=-1, userRatings={};

function checkPwd(){
  const v=document.getElementById('pwd-input').value.trim();
  if(v===PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    loadRatings(); renderAll(); updateStats();
  } else {
    const e=document.getElementById('pwd-error');
    e.style.display='block';
    setTimeout(()=>e.style.display='none',2000);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')checkPwd();});

function loadRatings(){try{userRatings=JSON.parse(localStorage.getItem('home_ratings_v1')||'{}');}catch(e){userRatings={};}}
function saveToStorage(){localStorage.setItem('home_ratings_v1',JSON.stringify(userRatings));}
function getEffectiveRating(name){return Object.assign({},RATINGS_DATA[name]||{},userRatings[name]||{});}

function valClass(key,val){
  if(!val)return '';
  if(['good','wow','yes','vgood','5x'].includes(val))return 'val-'+val;
  if(['notbad','notyet','3x'].includes(val))return 'val-'+val;
  if(['bad','no'].includes(val))return 'val-'+val;
  return '';
}

function setFilter(btn,cat){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); currentFilter=cat; applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const rows=document.querySelectorAll('#table-body tr');
  const cards=document.querySelectorAll('.product-card');
  PRODUCTS.forEach((name,i)=>{
    const cat=CAT_MAP[name]||'';
    const show=(currentFilter==='all'||cat===currentFilter)&&name.toLowerCase().includes(q);
    if(rows[i])rows[i].style.display=show?'':'none';
    if(cards[i])cards[i].style.display=show?'':'none';
  });
}

function updateStats(){
  let rated=0,wow=0,fiveX=0;
  PRODUCTS.forEach(name=>{
    const r=getEffectiveRating(name);
    if(r.value)rated++;
    if(r.wow==='wow')wow++;
    if(r.margin==='5x')fiveX++;
  });
  document.getElementById('stat-rated').textContent=rated;
  document.getElementById('stat-wow').textContent=wow;
  document.getElementById('stat-5x').textContent=fiveX;
}

function renderAll(){renderTable();renderCards();}

function renderTable(){
  const tbody=document.getElementById('table-body');
  if(!tbody)return;
  tbody.innerHTML=PRODUCTS.map((name,i)=>{
    const cat=CAT_MAP[name]||'Home';
    const R=getEffectiveRating(name);
    const enc=encodeURIComponent(name);
    const lb=(cls,lbl,href)=>`<a class="link-btn ${cls}" href="${href}" target="_blank"><span class="dot"></span>${lbl}</a>`;
    const ratings=Object.keys(RATING_LABELS).map(key=>{
      const val=R[key];const cls=valClass(key,val);
      return `<div class="rating-row"><span class="rating-key">${RATING_LABELS[key]}</span><span class="rating-badge ${cls}">${VAL_LABELS[val]||'—'}</span></div>`;
    }).join('');
    return `<tr onclick="openPanel(${i})" id="row-${i}">
      <td class="td-num">${String(i+1).padStart(3,'0')}</td>
      <td class="td-name">${name}</td>
      <td><span class="td-cat">${cat}</span></td>
      <td><div class="links-col"><div class="link-row">
        ${lb('ali','ALI',`https://www.aliexpress.com/wholesale?SearchText=${enc}`)}${lb('tik','TIK',`https://www.tiktok.com/search?q=${enc}`)}${lb('ig','IG',`https://www.instagram.com/explore/tags/${encodeURIComponent(name.replace(/ /g,''))}`)}${lb('amz','AMZ',`https://www.amazon.com/s?k=${enc}`)}${lb('fb','FB',`https://www.facebook.com/ads/library/?active_status=all&ad_type=all&country=ALL&q=${enc}&search_type=keyword_unordered`)}
      </div></div></td>
      <td><div class="ratings-col">${ratings}</div></td>
    </tr>`;
  }).join('');
}

function renderCards(){
  const cl=document.getElementById('card-list');
  if(!cl)return;
  cl.innerHTML=PRODUCTS.map((name,i)=>{
    const cat=CAT_MAP[name]||'Home';
    const R=getEffectiveRating(name);
    const chips=Object.keys(RATING_LABELS).map(key=>{
      const val=R[key];if(!val)return '';
      return `<span class="card-rating-chip chip-${val}">${RATING_LABELS[key]}: ${VAL_LABELS[val]||'—'}</span>`;
    }).join('');
    return `<div class="product-card" onclick="openPanel(${i})" id="card-${i}">
      <div class="card-top">
        <div class="card-left">
          <span class="card-num">${String(i+1).padStart(3,'0')}</span>
          <span class="card-name">${name}</span>
        </div>
        <span class="card-cat">${cat}</span>
      </div>
      <div class="card-ratings-mini">${chips}</div>
    </div>`;
  }).join('');
}

function openPanel(idx){
  currentIdx=idx;
  const name=PRODUCTS[idx];
  const cat=CAT_MAP[name]||'Home';
  const R=getEffectiveRating(name);
  document.getElementById('panel-title').textContent=name;
  document.getElementById('panel-cat').textContent=cat;
  const enc2=encodeURIComponent(name);
  document.getElementById('panel-links').innerHTML=`
    <a class="link-btn ali" href="https://www.aliexpress.com/wholesale?SearchText=${enc2}" target="_blank"><span class="dot"></span>AliExpress</a>
    <a class="link-btn tik" href="https://www.tiktok.com/search?q=${enc2}" target="_blank"><span class="dot"></span>TikTok</a>
    <a class="link-btn ig" href="https://www.instagram.com/explore/tags/${encodeURIComponent(name.replace(/ /g,''))}" target="_blank"><span class="dot"></span>Instagram</a>
    <a class="link-btn amz" href="https://www.amazon.com/s?k=${enc2}" target="_blank"><span class="dot"></span>Amazon</a>
    <a class="link-btn fb" href="https://www.facebook.com/ads/library/?active_status=all&ad_type=all&country=ALL&q=${enc2}&search_type=keyword_unordered" target="_blank"><span class="dot"></span>FB Ads</a>
  `;
  let fieldsHtml='';
  for(const [key,opts] of Object.entries(RATING_OPTS_MAP)){
    const cur=R[key]||'';
    fieldsHtml+=`<div class="rating-field">
      <label class="rating-field-label">${RATING_LABELS[key]}</label>
      <div class="rating-options">
        ${opts.map(o=>`<button class="rating-opt ${cur===o?'selected-'+o:''}" onclick="selectOpt('${key}','${o}',this)">${VAL_LABELS[o]}</button>`).join('')}
      </div>
    </div>`;
  }
  fieldsHtml+=`<div class="rating-field">
    <label class="rating-field-label">Notes</label>
    <textarea class="notes-field" id="notes-ta" placeholder="Research notes...">${R.notes||''}</textarea>
  </div>`;
  document.getElementById('rating-fields').innerHTML=fieldsHtml;
  const defNotes=RATINGS_DATA[name]?.notes||'';
  document.getElementById('notes-preview').textContent=defNotes?'💡 '+defNotes:'';
  document.getElementById('rating-panel').classList.add('open');
}

function selectOpt(key,val,btn){
  btn.closest('.rating-options').querySelectorAll('.rating-opt').forEach(b=>{b.className='rating-opt';});
  btn.className=`rating-opt selected-${val}`;
  if(!userRatings[PRODUCTS[currentIdx]])userRatings[PRODUCTS[currentIdx]]={};
  userRatings[PRODUCTS[currentIdx]][key]=val;
}

function saveRatings(){
  if(currentIdx<0)return;
  const name=PRODUCTS[currentIdx];
  if(!userRatings[name])userRatings[name]={};
  userRatings[name].notes=document.getElementById('notes-ta').value;
  saveToStorage(); renderAll(); updateStats(); closePanel();
}

function closePanel(){
  document.getElementById('rating-panel').classList.remove('open');
  currentIdx=-1;
}
</script>
</body>
</html>
