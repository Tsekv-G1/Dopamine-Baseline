<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIDS — Product Research</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a; --bg2:#121212; --bg3:#1a1a1a;
    --border:#222; --border2:#333;
    --text:#f0f0f0; --muted:#777; --muted2:#3a3a3a;
    --accent:#ce93d8; --accent2:#ff6b35; --white:#fff;
    --tik:#69c9d0; --ig:#e1306c; --fb:#5890ff; --amz:#ffaa44; --ali:#ff6b35;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;font-size:14px;}

  /* LOGIN */
  #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .login-box{width:min(400px,92vw);padding:40px 28px;border:1px solid var(--border2);background:var(--bg2);position:relative;}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
  .login-logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
  .login-logo-img{height:36px;width:36px;object-fit:contain;border-radius:4px;}
  .login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:.15em;color:var(--white);}
  .login-logo span{color:var(--accent);}
  .login-sub{font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:36px;}
  .login-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:block;}
  .login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:16px;padding:14px 16px;outline:none;transition:border-color .2s;letter-spacing:.1em;}
  .login-input:focus{border-color:var(--accent);}
  .login-btn{width:100%;margin-top:16px;padding:15px;background:var(--accent);color:#000;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
  .login-btn:hover{opacity:.85;}
  .login-error{margin-top:12px;font-size:12px;color:var(--accent2);letter-spacing:.1em;display:none;text-align:center;}

  /* APP */
  #app{display:none;}
  .header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;z-index:100;}
  .header-logo-wrap{display:flex;align-items:center;gap:10px;}
  .header-logo-img{height:28px;width:28px;object-fit:contain;border-radius:3px;}
  .header-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:.2em;color:var(--white);}
  .header-logo span{color:var(--accent);}
  .header-meta{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}

  .stats-bar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:0;background:var(--bg2);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .stats-bar::-webkit-scrollbar{display:none;}
  .stat{display:flex;flex-direction:column;gap:4px;min-width:80px;padding-right:20px;border-right:1px solid var(--border);margin-right:20px;flex-shrink:0;}
  .stat:last-child{border-right:none;}
  .stat-val{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;color:var(--white);}
  .stat-val.accent{color:var(--accent);}
  .stat-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

  /* TABLE */
  .table-wrap{padding:0 20px 280px;}
  table{width:100%;border-collapse:collapse;}
  thead tr{border-bottom:2px solid var(--border2);position:sticky;top:56px;background:var(--bg);z-index:50;}
  th{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:14px 10px;text-align:left;font-weight:400;white-space:nowrap;}
  th:first-child{padding-left:0;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .12s;}
  tbody tr:hover{background:var(--bg2);}
  td{padding:14px 10px;font-size:12px;color:var(--text);vertical-align:top;}
  td:first-child{padding-left:0;}
  .td-num{color:var(--muted);font-size:11px;width:36px;padding-top:16px;}
  .td-name{font-family:'Syne',sans-serif;font-weight:600;font-size:14px;color:var(--white);min-width:160px;padding-top:14px;line-height:1.4;}
  .td-cat{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:rgba(206,147,216,.08);padding:4px 10px;display:inline-block;border:1px solid rgba(206,147,216,.15);}

  /* Links */
  .links-col{display:flex;flex-direction:column;gap:5px;min-width:120px;}
  .link-row{display:flex;gap:5px;flex-wrap:wrap;}
  .link-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;border:1px solid var(--border2);color:#888;background:transparent;white-space:nowrap;transition:all .15s;font-family:'DM Mono',monospace;}
  .link-btn.ali{color:var(--ali);border-color:rgba(255,107,53,.3);}
  .link-btn.tik{color:var(--tik);border-color:rgba(105,201,208,.3);}
  .link-btn.ig{color:var(--ig);border-color:rgba(225,48,108,.3);}
  .link-btn.fb{color:var(--fb);border-color:rgba(88,144,255,.3);}
  .link-btn.amz{color:var(--amz);border-color:rgba(255,170,68,.3);}
  .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}

  
  .ratings-col { display:flex; flex-direction:column; gap:5px; min-width:180px; }
  .rating-row { display:flex; align-items:center; gap:8px; }
  .rating-key { font-size:10px; color:#666; letter-spacing:.05em; width:80px; flex-shrink:0; }
  .rating-badge { font-size:11px; letter-spacing:.06em; padding:3px 8px; border:1px solid #2a2a2a; color:#555; }
  .rating-badge.val-good,.rating-badge.val-wow,.rating-badge.val-yes,.rating-badge.val-vgood,.rating-badge.val-5x { color:#ce93d8; border-color:rgba(206,147,216,.3); }
  .rating-badge.val-notbad,.rating-badge.val-notyet,.rating-badge.val-3x { color:#ffaa00; border-color:rgba(255,170,0,.3); }
  .rating-badge.val-bad,.rating-badge.val-no { color:#ff5555; border-color:rgba(255,85,85,.3); }
  .rv-good,.rv-wow,.rv-yes,.rv-vgood,.rv-5x { color:#ce93d8; }
  .rv-notbad,.rv-notyet,.rv-3x { color:#ffaa00; }
  .rv-bad,.rv-no { color:#ff5555; }
  .rv-empty { color:#333; }


  /* MOBILE CARDS */
  #card-list{display:none;}
  @media (max-width:768px) {
    .table-wrap table{display:none;}
    #card-list{display:flex;flex-direction:column;gap:1px;}
    .table-wrap{padding:0 0 280px;overflow-x:visible;}

    .product-card{background:#111;border-bottom:1px solid #1e1e1e;padding:16px 14px;}
    .product-card:active{background:#161616;}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;}
    .card-left{display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0;}
    .card-num{font-size:11px;color:#444;min-width:26px;padding-top:2px;flex-shrink:0;}
    .card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;line-height:1.3;}
    .card-cat{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#ce93d8;background:rgba(206,147,216,.07);border:1px solid rgba(206,147,216,.15);padding:3px 7px;white-space:nowrap;flex-shrink:0;}
    .card-section{margin-bottom:8px;}
    .card-section-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#444;margin-bottom:4px;}
    .card-links{display:flex;flex-wrap:wrap;gap:5px;}
    .card-link{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;font-size:10px;letter-spacing:.07em;text-transform:uppercase;text-decoration:none;border:1px solid #2a2a2a;color:#888;font-family:'DM Mono',monospace;}
    .card-link .dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
    .card-link.ali{color:#ff6b35;border-color:rgba(255,107,53,.25);}
    .card-link.tik{color:#69c9d0;border-color:rgba(105,201,208,.25);}
    .card-link.ig{color:#e1306c;border-color:rgba(225,48,108,.25);}
    .card-link.fb{color:#5890ff;border-color:rgba(88,144,255,.25);}
    .card-link.amz{color:#ffaa44;border-color:rgba(255,170,68,.25);}
    .card-ratings{display:flex;flex-direction:column;gap:3px;margin-top:8px;}
    .card-rating-row{display:flex;align-items:center;justify-content:space-between;background:#161616;padding:6px 10px;border:1px solid #1e1e1e;}
    .card-rating-key{font-size:10px;color:#555;}
    .card-rating-val{font-size:11px;font-weight:600;}
    .header{padding:0 14px;height:50px;}
    .header-logo{font-size:14px;}
    .stats-bar{padding:10px 14px;}
    .stat{min-width:70px;padding-right:14px;margin-right:14px;}
    .stat-val{font-size:17px;}
    .stat-label{font-size:9px;}
    .modal{width:calc(100% - 20px);max-width:520px;padding:20px 16px;max-height:88vh;overflow-y:auto;}
  }
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>

function defaultRatings(name) {
  const r = AI_RATINGS[name];
  if (r) return { valueInfo:'', value:r.value||'', wow:r.wow||'', saturation:r.saturation||'', easy:r.easy||'', margin:r.margin||'', unique:r.unique||'', problem:r.problem||'', notes:'' };
  return { valueInfo:'', value:'', wow:'', saturation:'', easy:'', margin:'', unique:'', problem:'', notes:'' };
}

function initData() {
  const saved = localStorage.getItem('kids_research_v1');
  if (saved) { try { data_store = JSON.parse(saved); } catch(e) { data_store = {}; } }
  PRODUCTS.forEach((name, i) => {
    if (!data_store[i]) data_store[i] = { links: defaultLinks(name), ratings: defaultRatings(name) };
    if (!data_store[i].links) data_store[i].links = defaultLinks(name);
    const L = data_store[i].links;
    if (!('comp1' in L)) { L.comp1 = L.amz || ''; L.comp2 = ''; delete L.amz; }
    if (!data_store[i].ratings) data_store[i].ratings = defaultRatings(name);
    if (data_store[i].ratings.valueInfo === undefined) data_store[i].ratings.valueInfo = '';
  });
}

// Use data_store as data alias
const data = new Proxy({}, {
  get(t, k) { return data_store[k]; },
  set(t, k, v) { data_store[k] = v; return true; }
});

function updateStats() {
  let rated = 0;
  PRODUCTS.forEach((_, i) => {
    const r = data_store[i] && data_store[i].ratings;
    if (r && (r.value || r.wow || r.margin)) rated++;
  });
  const el = document.getElementById('stat-rated');
  if (el) el.textContent = rated;
}

const RATING_OPTS = {
  value:      [['','—'],['good','Good'],['notbad','Not Bad'],['bad','Bad']],
  wow:        [['','—'],['wow','Wow'],['good','Good'],['notyet','Not Yet']],
  saturation: [['','—'],['yes','Yes'],['no','No'],['notyet','Not Yet']],
  easy:       [['','—'],['vgood','Very Good'],['good','Good'],['notbad','Not Bad']],
  margin:     [['','—'],['3x','3x'],['5x','5x']],
  unique:     [['','—'],['yes','Yes'],['no','No']],
  problem:    [['','—'],['yes','Yes'],['no','No']],
};

const RATING_LABELS = {
  value:'Value', wow:'Wow Factor', saturation:'Saturation',
  easy:'Easy Mkt', margin:'Margin', unique:'Unique', problem:'Problem'
};

function valClass(key, val) {
  if (!val) return '';
  const map = { good:'val-good', wow:'val-wow', notbad:'val-notbad', bad:'val-bad',
    yes:'val-yes', no:'val-no', notyet:'val-notyet', vgood:'val-vgood',
    '3x':'val-3x', '5x':'val-5x' };
  return map[val] || '';
}

function renderCards() {
  const list = document.getElementById('card-list');
  if (!list) return;
  const ratingClass = v => ({good:'rv-good',wow:'rv-wow',yes:'rv-yes',vgood:'rv-vgood','5x':'rv-5x',
    notbad:'rv-notbad',notyet:'rv-notyet','3x':'rv-3x',bad:'rv-bad',no:'rv-no'}[v]||'rv-empty');
  const ratingLabel = (k,v) => ({good:'Good',wow:'Wow',notbad:'Not Bad',bad:'Bad',yes:'Yes',no:'No',
    notyet:'Not Yet',vgood:'Very Good','3x':'3x','5x':'5x'}[v]||'—');
  const RKEYS = [['value','Value'],['wow','Wow'],['saturation','Sat.'],['easy','Easy'],['margin','Margin'],['unique','Unique'],['problem','Problem']];
  list.innerHTML = PRODUCTS.map((name, i) => {
    const L = data[i].links;
    const R = data[i].ratings;
    
    const lb = (cls,label,href) => href ? `<a class="card-link ${cls}" href="${href}" target="_blank"><span class="dot"></span>${label}</a>` : '';
    const ratingsHtml = RKEYS.map(([key,label]) =>
      `<div class="card-rating-row">
        <span class="card-rating-key">${label}</span>
        <span class="card-rating-val ${ratingClass(R[key])}">${ratingLabel(key,R[key])}</span>
      </div>`).join('');
    return `<div class="product-card">
      <div class="card-top">
        <div class="card-left">
          <span class="card-num">${String(i+1).padStart(3,'0')}</span>
          <span class="card-name">${name}</span>
        </div>
        <span class="card-cat">Kids</span>
      </div>
      ${(L.sup1||L.sup2)?`<div class="card-section"><div class="card-section-label">Supplier</div><div class="card-links">${lb('ali','ALI·1',L.sup1)}${lb('ali','ALI·2',L.sup2)}</div></div>`:''}
      ${(L.tik||L.ig||L.fb)?`<div class="card-section"><div class="card-section-label">Social</div><div class="card-links">${lb('tik','TIK',L.tik)}${lb('ig','IG',L.ig)}${lb('fb','FB',L.fb)}</div></div>`:''}
      ${(L.comp1||L.comp2)?`<div class="card-section"><div class="card-section-label">Competitors</div><div class="card-links">${lb('amz','COMP·1',L.comp1)}${lb('amz','COMP·2',L.comp2)}</div></div>`:''}
      <div class="card-ratings">${ratingsHtml}</div>
    </div>`;
  }).join('');
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  if (!tbody) return;
  tbody.innerHTML = PRODUCTS.map((name, i) => {
    const L = data[i].links;
    const R = data[i].ratings;
    const linkBtn = (cls, label, href) =>
      href ? `<a class="link-btn ${cls}" href="${href}" target="_blank"><span class="dot"></span>${label}</a>` : '';
    const ratings = Object.keys(RATING_OPTS).map(key => {
      const val = R[key];
      const cls = valClass(key, val);
      const labels = {good:'Good',wow:'Wow',notbad:'Not Bad',bad:'Bad',yes:'Yes',no:'No',notyet:'Not Yet',vgood:'Very Good','3x':'3x','5x':'5x'};
      return `<div class="rating-row">
        <span class="rating-key">${RATING_LABELS[key]}</span>
        <span class="rating-badge ${cls}">${labels[val]||'—'}</span>
      </div>`;
    }).join('');
    return `<tr id="row-${i}" class="${''}">
      <td class="td-num">${String(i+1).padStart(3,'0')}</td>
      <td class="td-name">${name}</td>
      <td><span class="td-cat">Kids</span></td>
      <td><div class="links-col"><div class="link-row">
        ${linkBtn('ali','ALI·1',L.sup1)}
        ${linkBtn('ali','ALI·2',L.sup2)}
      </div></div></td>
      <td><div class="links-col"><div class="link-row">
        ${linkBtn('tik','TIK',L.tik)}
        ${linkBtn('ig','IG',L.ig)}
        ${linkBtn('fb','FB',L.fb)}
      </div></div></td>
      <td><div class="links-col"><div class="link-row">
        ${linkBtn('amz','COMP·1',L.comp1)}
        ${linkBtn('amz','COMP·2',L.comp2)}
      </div></div></td>
      <td><div class="ratings-col">${ratings}</div></td>
    </tr>`;
  }).join('');
  updateStats();
  renderCards();
}

function checkPwd() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initData();
    renderTable();
  } else {
    const err = document.getElementById('pwd-error');
    err.style.display = 'block';
    document.getElementById('pwd-input').style.borderColor = '#ff4444';
    setTimeout(() => { err.style.display='none'; document.getElementById('pwd-input').style.borderColor=''; }, 2000);
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => { if(e.key==='Enter') checkPwd(); });
</script>
